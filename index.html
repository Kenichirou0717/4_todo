<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODO App</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 60px 16px 40px;
      color: #e0e0e0;
    }

    .container {
      width: 100%;
      max-width: 560px;
    }

    h1 {
      text-align: center;
      font-size: 2.8rem;
      font-weight: 300;
      letter-spacing: 0.3em;
      color: #c084fc;
      margin-bottom: 36px;
      text-transform: uppercase;
    }

    /* Input area */
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    #new-todo {
      flex: 1;
      padding: 14px 18px;
      border: none;
      border-radius: 10px;
      background: #16213e;
      color: #e0e0e0;
      font-size: 1rem;
      outline: none;
      transition: box-shadow 0.2s;
    }
    #new-todo::placeholder { color: #555; }
    #new-todo:focus { box-shadow: 0 0 0 2px #c084fc; }

    #add-btn {
      padding: 14px 20px;
      border: none;
      border-radius: 10px;
      background: #c084fc;
      color: #1a1a2e;
      font-size: 1.4rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      line-height: 1;
    }
    #add-btn:hover { background: #a855f7; }
    #add-btn:active { transform: scale(0.95); }

    /* Filters */
    .filters {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-bottom: 20px;
    }

    .filter-btn {
      padding: 6px 16px;
      border: 1px solid #333;
      border-radius: 20px;
      background: transparent;
      color: #888;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover { color: #c084fc; border-color: #c084fc; }
    .filter-btn.active {
      background: #c084fc;
      border-color: #c084fc;
      color: #1a1a2e;
      font-weight: 600;
    }

    /* Todo list */
    .todo-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 40px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: #16213e;
      border-radius: 10px;
      border: 1px solid #1e2a4a;
      animation: slideIn 0.2s ease;
      transition: opacity 0.2s, transform 0.2s;
    }
    .todo-item.removing {
      opacity: 0;
      transform: translateX(20px);
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Custom checkbox */
    .check-wrap {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      position: relative;
      cursor: pointer;
    }
    .check-wrap input[type="checkbox"] {
      position: absolute;
      opacity: 0;
      width: 0; height: 0;
    }
    .checkmark {
      position: absolute;
      inset: 0;
      border: 2px solid #444;
      border-radius: 6px;
      background: transparent;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .check-wrap input:checked ~ .checkmark {
      background: #c084fc;
      border-color: #c084fc;
    }
    .checkmark::after {
      content: '';
      width: 5px;
      height: 10px;
      border: 2px solid #1a1a2e;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translateY(-1px);
      opacity: 0;
      transition: opacity 0.15s;
    }
    .check-wrap input:checked ~ .checkmark::after { opacity: 1; }

    /* Label (editable) */
    .todo-label {
      flex: 1;
      font-size: 1rem;
      line-height: 1.4;
      color: #e0e0e0;
      cursor: text;
      outline: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s, color 0.2s;
      min-width: 0;
      word-break: break-word;
    }
    .todo-label:focus {
      border-bottom-color: #c084fc;
    }
    .todo-item.done .todo-label {
      color: #555;
      text-decoration: line-through;
    }

    /* Delete button */
    .del-btn {
      flex-shrink: 0;
      background: none;
      border: none;
      color: #444;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      line-height: 1;
      transition: color 0.2s, background 0.2s;
      opacity: 0;
    }
    .todo-item:hover .del-btn { opacity: 1; }
    .del-btn:hover { color: #f87171; background: rgba(248,113,113,0.1); }

    /* Footer */
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 20px;
      font-size: 0.82rem;
      color: #555;
      padding: 0 4px;
    }

    #clear-btn {
      background: none;
      border: none;
      color: #555;
      font-size: 0.82rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
    }
    #clear-btn:hover { color: #f87171; background: rgba(248,113,113,0.08); }
    #clear-btn:disabled { opacity: 0.3; cursor: default; background: none; color: #555; }

    .empty-state {
      text-align: center;
      color: #333;
      font-size: 0.9rem;
      padding: 32px 0;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>TODO</h1>

  <div class="input-row">
    <input id="new-todo" type="text" placeholder="新しいタスクを入力..." autocomplete="off">
    <button id="add-btn" title="追加">+</button>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">すべて</button>
    <button class="filter-btn" data-filter="active">未完了</button>
    <button class="filter-btn" data-filter="completed">完了済み</button>
  </div>

  <ul class="todo-list" id="todo-list">
    <li class="empty-state" id="empty-msg">タスクがありません</li>
  </ul>

  <div class="footer">
    <span id="count-label">0 件のタスク</span>
    <button id="clear-btn" disabled>完了済みを削除</button>
  </div>
</div>

<script>
  // ── State ──────────────────────────────────────────────────
  let todos = JSON.parse(localStorage.getItem('todos') || '[]');
  let filter = 'all';
  let nextId = todos.length ? Math.max(...todos.map(t => t.id)) + 1 : 1;

  // ── Persist ────────────────────────────────────────────────
  function save() {
    localStorage.setItem('todos', JSON.stringify(todos));
  }

  // ── Helpers ────────────────────────────────────────────────
  function visibleTodos() {
    if (filter === 'active')    return todos.filter(t => !t.done);
    if (filter === 'completed') return todos.filter(t =>  t.done);
    return todos;
  }

  function activeCnt()    { return todos.filter(t => !t.done).length; }
  function completedCnt() { return todos.filter(t =>  t.done).length; }

  // ── Render ─────────────────────────────────────────────────
  function render() {
    const list    = document.getElementById('todo-list');
    const empty   = document.getElementById('empty-msg');
    const countEl = document.getElementById('count-label');
    const clearEl = document.getElementById('clear-btn');

    const visible = visibleTodos();

    // empty state
    if (visible.length === 0) {
      list.innerHTML = '';
      empty.style.display = '';
      list.appendChild(empty);
    } else {
      empty.style.display = 'none';
      // sync DOM with data
      const existing = new Map(
        [...list.querySelectorAll('.todo-item')].map(el => [+el.dataset.id, el])
      );
      const newIds = new Set(visible.map(t => t.id));

      // remove stale
      existing.forEach((el, id) => { if (!newIds.has(id)) list.removeChild(el); });

      // insert/update in order
      visible.forEach((todo, i) => {
        let el = existing.get(todo.id);
        if (!el) {
          el = createItem(todo);
          list.appendChild(el);
        } else {
          updateItem(el, todo);
        }
        // ensure order
        if (list.children[i] !== el) list.insertBefore(el, list.children[i] || null);
      });
    }

    const ac = activeCnt();
    countEl.textContent = `${ac} 件未完了`;
    clearEl.disabled = completedCnt() === 0;
  }

  function createItem(todo) {
    const li = document.createElement('li');
    li.className = 'todo-item' + (todo.done ? ' done' : '');
    li.dataset.id = todo.id;
    li.innerHTML = `
      <label class="check-wrap" title="完了にする">
        <input type="checkbox" ${todo.done ? 'checked' : ''}>
        <span class="checkmark"></span>
      </label>
      <span class="todo-label" contenteditable="true" spellcheck="false">${escHtml(todo.text)}</span>
      <button class="del-btn" title="削除">✕</button>
    `;
    bindItem(li, todo.id);
    return li;
  }

  function updateItem(el, todo) {
    el.className = 'todo-item' + (todo.done ? ' done' : '');
    el.querySelector('input[type="checkbox"]').checked = todo.done;
    const label = el.querySelector('.todo-label');
    if (document.activeElement !== label) {
      label.textContent = todo.text;
    }
  }

  function bindItem(li, id) {
    // checkbox
    li.querySelector('input[type="checkbox"]').addEventListener('change', e => {
      const todo = todos.find(t => t.id === id);
      if (todo) { todo.done = e.target.checked; save(); render(); }
    });

    // inline edit
    const label = li.querySelector('.todo-label');
    label.addEventListener('blur', () => {
      const text = label.textContent.trim();
      if (!text) {
        removeTodo(id);
      } else {
        const todo = todos.find(t => t.id === id);
        if (todo && todo.text !== text) { todo.text = text; save(); }
      }
    });
    label.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); label.blur(); }
      if (e.key === 'Escape') {
        const todo = todos.find(t => t.id === id);
        if (todo) label.textContent = todo.text;
        label.blur();
      }
    });

    // delete
    li.querySelector('.del-btn').addEventListener('click', () => removeTodo(id));
  }

  function removeTodo(id) {
    const el = document.querySelector(`.todo-item[data-id="${id}"]`);
    if (el) {
      el.classList.add('removing');
      el.addEventListener('transitionend', () => {
        todos = todos.filter(t => t.id !== id);
        save();
        render();
      }, { once: true });
    } else {
      todos = todos.filter(t => t.id !== id);
      save();
      render();
    }
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Add todo ───────────────────────────────────────────────
  function addTodo() {
    const input = document.getElementById('new-todo');
    const text  = input.value.trim();
    if (!text) return;
    todos.push({ id: nextId++, text, done: false });
    input.value = '';
    save();
    render();
  }

  document.getElementById('add-btn').addEventListener('click', addTodo);
  document.getElementById('new-todo').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTodo();
  });

  // ── Filters ────────────────────────────────────────────────
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filter = btn.dataset.filter;
      render();
    });
  });

  // ── Clear completed ────────────────────────────────────────
  document.getElementById('clear-btn').addEventListener('click', () => {
    todos = todos.filter(t => !t.done);
    save();
    render();
  });

  // ── Init ───────────────────────────────────────────────────
  render();
</script>
</body>
</html>
